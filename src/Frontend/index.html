<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VegasShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 14px; background: #1e1e1e; color: #d4d4d4; }
    #app { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { color: #569cd6; margin-bottom: 20px; }
    h2 { color: #4ec9b0; margin-bottom: 10px; }
    nav { display: flex; gap: 10px; margin-bottom: 20px; }
    nav button { background: #2d2d2d; color: #d4d4d4; border: 1px solid #555; padding: 6px 14px; cursor: pointer; }
    nav button:hover { background: #3e3e3e; }
    nav button.active { border-color: #569cd6; color: #569cd6; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: #2d2d2d; border: 1px solid #3e3e3e; padding: 14px; margin-bottom: 10px; }
    .card h3 { color: #ce9178; margin-bottom: 6px; }
    input, select { background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; padding: 6px 10px; width: 100%; margin-bottom: 8px; }
    button.btn { background: #0e639c; color: #fff; border: none; padding: 8px 18px; cursor: pointer; margin-top: 4px; }
    button.btn:hover { background: #1177bb; }
    button.btn.danger { background: #6e1414; }
    button.btn.danger:hover { background: #8b1a1a; }
    .msg { margin-top: 10px; padding: 8px; }
    .msg.ok { background: #1e3a1e; color: #6a9955; border: 1px solid #3a6a3a; }
    .msg.err { background: #3a1e1e; color: #f44747; border: 1px solid #6a3a3a; }
    .tag { display: inline-block; background: #3e3e3e; border: 1px solid #555; padding: 2px 8px; margin: 2px; font-size: 12px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #3e3e3e; }
    .user-info { color: #9cdcfe; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    td, th { border: 1px solid #3e3e3e; padding: 6px 10px; text-align: left; }
    th { background: #252526; color: #9cdcfe; }
    .shop-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .shop-tab { background: #2d2d2d; border: 1px solid #555; padding: 4px 10px; cursor: pointer; font-size: 12px; }
    .shop-tab.active { border-color: #4ec9b0; color: #4ec9b0; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 2px; font-size: 11px; }
    .badge.shop { background: #1e3a5f; color: #569cd6; }
    .badge.manual { background: #3a1e5f; color: #c586c0; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>&#x1f3b0; VegasShop</h1>
    <div class="user-info" id="user-info">не авторизован</div>
  </div>
  <nav>
    <button class="active" onclick="showPage('auth')">&#x1f511; Вход</button>
    <button onclick="showPage('shops')">&#x1f3ea; Магазины</button>
    <button onclick="showPage('purchases')">&#x1f4cb; Покупки</button>
  </nav>

  <div class="page active" id="page-auth">
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:200px">
        <h2>Вход</h2>
        <input id="login-user" placeholder="Логин" />
        <input id="login-pass" placeholder="Пароль" type="password" />
        <button class="btn" onclick="doLogin()">Войти</button>
        <div id="login-msg"></div>
      </div>
      <div class="card" style="flex:1;min-width:200px">
        <h2>Регистрация</h2>
        <input id="reg-user" placeholder="Логин" />
        <input id="reg-pass" placeholder="Пароль" type="password" />
        <button class="btn" onclick="doRegister()">Зарегистрироваться</button>
        <div id="reg-msg"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-shops">
    <h2>Магазины</h2>
    <div class="shop-tabs" id="shop-tabs">загрузка...</div>
    <div id="shop-products"></div>
    <div id="order-msg"></div>
  </div>

  <div class="page" id="page-purchases">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>История покупок</h2>
      <button class="btn" onclick="loadPurchases()">&#x21bb; Обновить</button>
    </div>
    <div id="purchases-list">загрузка...</div>
  </div>
</div>

<script>
  const API = '/api';
  let token = '';
  let currentShopId = null;
  let shops = [];

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const map = { auth: 0, shops: 1, purchases: 2 };
    document.querySelectorAll('nav button')[map[name]].classList.add('active');
    if (name === 'shops') loadShops();
    if (name === 'purchases') loadPurchases();
  }

  function msg(id, text, ok) {
    const el = document.getElementById(id);
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    el.textContent = text;
  }

  async function api(path, method, body, auth) {
    const headers = { 'Content-Type': 'application/json' };
    if (auth && token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    const json = await res.json().catch(() => ({}));
    return { status: res.status, json };
  }

  async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!username || !password) return msg('login-msg', 'Заполните все поля', false);
    const { status, json } = await api('/account/login', 'POST', { username, password });
    if (status === 200 && json.result?.token) {
      token = json.result.token;
      document.getElementById('user-info').textContent = '&#x1f464; ' + username;
      msg('login-msg', 'Добро пожаловать, ' + username + '!', true);
    } else {
      msg('login-msg', 'Ошибка: ' + (json.errors?.[0] || 'неверные данные'), false);
    }
  }

  async function doRegister() {
    const username = document.getElementById('reg-user').value.trim();
    const password = document.getElementById('reg-pass').value;
    if (!username || !password) return msg('reg-msg', 'Заполните все поля', false);
    const { status, json } = await api('/account/register', 'POST', { username, password });
    if (status === 200 && json.succeeded) {
      msg('reg-msg', 'Зарегистрирован! Теперь войдите.', true);
    } else {
      msg('reg-msg', 'Ошибка: ' + (json.errors?.[0] || 'попробуйте другой логин'), false);
    }
  }

  async function loadShops() {
    const { status, json } = await api('/shops/', 'GET');
    if (status !== 200) { document.getElementById('shop-tabs').textContent = 'Ошибка загрузки'; return; }
    shops = json.result || [];
    const tabs = document.getElementById('shop-tabs');
    tabs.innerHTML = shops.map(s =>
      `<div class="shop-tab" onclick="selectShop(${s.id})">${s.name || 'Магазин ' + s.id}</div>`
    ).join('');
    if (shops.length > 0) selectShop(shops[0].id);
  }

  async function selectShop(shopId) {
    currentShopId = shopId;
    document.querySelectorAll('.shop-tab').forEach((t, i) => {
      t.classList.toggle('active', shops[i]?.id === shopId);
    });
    const { status, json } = await api('/shops/' + shopId, 'GET');
    const container = document.getElementById('shop-products');
    if (status !== 200) { container.innerHTML = '<div class="msg err">Ошибка загрузки товаров</div>'; return; }
    const products = json.result?.products || [];
    if (!products.length) { container.innerHTML = '<div class="card">Нет товаров</div>'; return; }
    container.innerHTML = `
      <div class="card">
        <h3>Товары</h3>
        <table>
          <tr><th>Название</th><th>Категория</th><th>Цена</th><th>Остаток</th><th>Кол-во</th></tr>
          ${products.map(p => `
            <tr>
              <td>${p.name}</td>
              <td><span class="tag">${p.category || '—'}</span></td>
              <td>${p.cost} ₽</td>
              <td>${p.count}</td>
              <td><input type="number" min="1" max="10" value="1" id="qty-${p.id}" style="width:55px"></td>
            </tr>
          `).join('')}
        </table>
        <button class="btn" style="margin-top:12px" onclick="doOrder(${shopId}, [${products.map(p => p.id).join(',')}])">&#x2714; Заказать выбранное</button>
      </div>
    `;
  }

  async function doOrder(shopId, productIds) {
    if (!token) return msg('order-msg', 'Войдите, чтобы сделать заказ', false);
    const products = productIds
      .map(id => ({ productId: id, count: parseInt(document.getElementById('qty-' + id)?.value || '1') }))
      .filter(p => p.count > 0);
    const { status, json } = await api('/shops/' + shopId + '/order', 'POST', products, true);
    if (status === 200) {
      msg('order-msg', 'Заказ оформлен!', true);
      selectShop(shopId);
    } else {
      msg('order-msg', 'Ошибка: ' + (json.errors?.[0] || 'что-то пошло не так'), false);
    }
  }

  async function loadPurchases() {
    if (!token) { document.getElementById('purchases-list').innerHTML = '<div class="msg err">Войдите для просмотра покупок</div>'; return; }
    const { status, json } = await api('/purchases/', 'GET', null, true);
    const container = document.getElementById('purchases-list');
    if (status !== 200) { container.innerHTML = '<div class="msg err">Ошибка загрузки</div>'; return; }
    const txns = json.result || [];
    if (!txns.length) { container.innerHTML = '<div class="card">Покупок пока нет</div>'; return; }
    container.innerHTML = txns.map(t => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span><b>#${t.id}</b> &nbsp; ${new Date(t.date).toLocaleString('ru')}</span>
          <span class="badge ${t.isShopCreate ? 'shop' : 'manual'}">${t.isShopCreate ? 'магазин' : 'вручную'}</span>
        </div>
        <table style="margin-top:8px">
          <tr><th>Товар</th><th>Цена</th><th>Кол-во</th></tr>
          ${(t.products || []).map(p => `<tr><td>${p.name}</td><td>${p.cost} ₽</td><td>${p.count}</td></tr>`).join('')}
        </table>
        ${!t.isShopCreate ? `
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            <span style="font-size:12px">Тип:</span>
            <select id="type-${t.id}" style="width:80px">
              <option value="0" ${t.transactionType===0?'selected':''}>0</option>
              <option value="1" ${t.transactionType===1?'selected':''}>1</option>
            </select>
            <button class="btn" onclick="updateTxn(${t.id})">Сохранить</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  async function updateTxn(id) {
    const transactionType = parseInt(document.getElementById('type-' + id).value);
    const { status, json } = await api('/purchases/update', 'PUT', { id, transactionType }, true);
    if (status === 200) { loadPurchases(); }
    else { alert('Ошибка: ' + (json.errors?.[0] || 'не удалось обновить')); }
  }
</script>
</body>
</html>
