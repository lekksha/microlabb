worker_processes auto;
events { worker_connections 1024; }

http {
    # round-robin между двумя инстансами фронтенда
    upstream frontend_pool {
        server nginx1:80 max_fails=3 fail_timeout=10s;
        server nginx2:80 max_fails=3 fail_timeout=10s;
    }

    log_format upstreamlog '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log upstreamlog;

    server {
        listen 80;

        # Health-endpoint самого балансировщика
        location = /lb/health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location / {
            proxy_pass         http://frontend_pool;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Резерв: при 5xx или таймауте — попробовать соседний апстрим
            proxy_next_upstream      error timeout http_502 http_503 http_504;
            proxy_connect_timeout    3s;
            proxy_read_timeout       30s;
        }
    }
}
