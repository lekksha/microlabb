services:

  rabbit:
    hostname: rabbit
    image: rabbitmq:3.11-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - messaging
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-YourStrongPassword123!}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -No -b -o /dev/null 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -b -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend

  identityapi:
    image: microlabb/identityapi
    build:
      context: .
      dockerfile: Services/Identity/Identity.API/Dockerfile
    ports:
      - "7001:7001"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:7001
      - DefaultConnection=Server=db;Database=identity;User=sa;Password=${SA_PASSWORD:-YourStrongPassword123!};TrustServerCertificate=True;
      - Secret=${JWT_SECRET:-7c9e6679-7425-40de-944b-e07fc1f90ae6}
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7001/swagger/index.html > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend
      - messaging
      - gateway

  purchasesapi:
    image: microlabb/purchasesapi
    build:
      context: .
      dockerfile: Services/Purchases/Purchases.API/Dockerfile
    ports:
      - "7002:7002"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:7002
      - DefaultConnection=Server=db;Database=purchases;User=sa;Password=${SA_PASSWORD:-YourStrongPassword123!};TrustServerCertificate=True;
      - Secret=${JWT_SECRET:-7c9e6679-7425-40de-944b-e07fc1f90ae6}
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7002/swagger/index.html > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend
      - messaging
      - gateway

  shopsapi:
    image: microlabb/shopsapi
    build:
      context: .
      dockerfile: Services/Shops/Shops.API/Dockerfile
    ports:
      - "7003:7003"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:7003
      - DefaultConnection=Server=db;Database=shops;User=sa;Password=${SA_PASSWORD:-YourStrongPassword123!};TrustServerCertificate=True;
      - Secret=${JWT_SECRET:-7c9e6679-7425-40de-944b-e07fc1f90ae6}
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7003/swagger/index.html > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend
      - messaging
      - gateway

  factoriesapi:
    image: microlabb/factoriesapi
    build:
      context: .
      dockerfile: Services/Factories/Factories.API/Dockerfile
    ports:
      - "7004:7004"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:7004
      - DefaultConnection=Server=db;Database=factories;User=sa;Password=${SA_PASSWORD:-YourStrongPassword123!};TrustServerCertificate=True;
      - Secret=${JWT_SECRET:-7c9e6679-7425-40de-944b-e07fc1f90ae6}
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - messaging

  filesapi:
    image: microlabb/filesapi
    build:
      context: .
      dockerfile: Services/Files/Files.API/Dockerfile
    ports:
      - "7005:7005"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:7005
      - StoragePath=/app/uploads
    volumes:
      - files_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7005/swagger/index.html > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - gateway

  apigateway:
    image: microlabb/apigateway
    build:
      context: .
      dockerfile: VegasShop.ApiGateway/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5000
    depends_on:
      identityapi:
        condition: service_healthy
      purchasesapi:
        condition: service_healthy
      shopsapi:
        condition: service_healthy
      filesapi:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway
      - frontend

  # Servlet1 — первый инстанс фронтенда
  nginx1:
    image: microlabb/frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - apigateway
    restart: unless-stopped
    networks:
      - frontend

  # Servlet2 — второй инстанс фронтенда (балансировка)
  nginx2:
    image: microlabb/frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    depends_on:
      - apigateway
    restart: unless-stopped
    networks:
      - frontend

  # Балансировщик нагрузки перед nginx1/nginx2 — единая точка входа
  lb:
    image: microlabb/lb
    build:
      context: ./lb
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - nginx1
      - nginx2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/lb/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - frontend

volumes:
  sqlserver_data:
  files_data:

networks:
  # Фронтенд видит только Gateway, не видит БД и брокер
  frontend:
    driver: bridge
  # Gateway видит API-сервисы
  gateway:
    driver: bridge
  # API-сервисы общаются с БД
  backend:
    driver: bridge
  # API-сервисы и rabbit общаются через MassTransit
  messaging:
    driver: bridge
